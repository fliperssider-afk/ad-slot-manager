<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>広告枠マネージャー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Helvetica Neue',sans-serif;background:#f0f4ff;color:#111827;min-height:100vh}
input,select,button{font-family:inherit}
.hidden{display:none!important}
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#eef2ff,#f0fdf4)}
.auth-card{background:#fff;border-radius:20px;padding:36px 32px;box-shadow:0 20px 60px rgba(0,0,0,.12);width:92%;max-width:380px}
.auth-logo{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#6366f1,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 16px}
.auth-title{font-size:20px;font-weight:800;text-align:center;margin-bottom:4px}
.auth-sub{font-size:13px;color:#9ca3af;text-align:center;margin-bottom:24px}
.fl{font-size:11px;font-weight:600;color:#6b7280;margin-bottom:5px;letter-spacing:.3px}
.fld{margin-bottom:14px}
.inp{width:100%;padding:10px 12px;border-radius:9px;border:1.5px solid #e5e7eb;font-size:14px;outline:none;transition:border-color .15s}
.inp:focus{border-color:#6366f1}
.btn-primary{width:100%;padding:11px;border-radius:10px;border:none;background:linear-gradient(135deg,#6366f1,#3b82f6);color:#fff;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(99,102,241,.35)}
.auth-error{background:#fef2f2;border:1.5px solid #fecaca;border-radius:9px;padding:10px 13px;font-size:13px;color:#dc2626;margin-bottom:14px;display:none}
#app-screen{min-height:100vh}
.header{background:#fff;border-bottom:1.5px solid #e5e7eb;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:10px}
.header-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#6366f1,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:17px}
.header-title{font-weight:800;font-size:15px}
.header-sub{font-size:10px;color:#9ca3af}
.header-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.month-btn{padding:5px 13px;border-radius:8px;border:1.5px solid #e5e7eb;background:#fff;color:#374151;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.month-btn.active{border:none;background:linear-gradient(135deg,#6366f1,#3b82f6);color:#fff;box-shadow:0 3px 10px rgba(99,102,241,.28);font-weight:700}
.month-add-btn{padding:5px 13px;border-radius:8px;border:1.5px dashed #a5b4fc;background:#eef2ff;color:#6366f1;cursor:pointer;font-size:13px;font-weight:600}
.logout-btn{padding:5px 12px;border-radius:8px;border:1.5px solid #e5e7eb;background:#fff;color:#6b7280;cursor:pointer;font-size:12px;font-weight:600}
.main{max-width:1020px;margin:0 auto;padding:18px 14px}
.empty{text-align:center;padding:100px 20px;color:#9ca3af}
.page-tabs{display:flex;gap:5px;margin-bottom:16px;background:#fff;border-radius:14px;padding:5px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.page-tab{flex:1;padding:8px 10px;border-radius:10px;border:none;background:transparent;color:#6b7280;cursor:pointer;font-weight:500;font-size:13px;transition:all .15s}
.page-tab.active{background:linear-gradient(135deg,#6366f1,#3b82f6);color:#fff;font-weight:700;box-shadow:0 3px 10px rgba(99,102,241,.3)}
.type-tag{border-radius:5px;padding:1px 6px;font-size:10px;font-weight:700}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.toolbar-left{display:flex;align-items:center;gap:8px}
.toolbar-right{display:flex;gap:6px;flex-wrap:wrap}
.page-name{font-weight:700;font-size:16px}
.page-cfg-badge{padding:3px 10px;border-radius:20px;background:#eef2ff;color:#6366f1;font-size:12px;font-weight:600}
.tbtn{padding:6px 13px;border-radius:8px;border:1.5px solid #e5e7eb;background:#fff;color:#374151;cursor:pointer;font-size:12px;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.copy-banner{display:flex;align-items:center;gap:8px;background:#fef3c7;border:1.5px solid #f59e0b;border-radius:9px;padding:6px 12px;font-size:12px;font-weight:700;color:#92400e}
.copy-end-btn{background:#f59e0b;border:none;border-radius:6px;color:#fff;font-weight:700;font-size:11px;padding:3px 9px;cursor:pointer}
.slot-grid{display:grid;gap:8px;margin-bottom:24px}
.slot-card{position:relative;border-radius:11px;border:2px solid #e5e7eb;background:#fff;min-height:86px;padding:11px 12px;cursor:pointer;transition:all .13s;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.slot-card.job{min-height:72px}
.slot-num{position:absolute;top:5px;left:8px;font-size:10px;font-weight:700;color:#d1d5db}
.slot-actions{position:absolute;top:4px;right:5px;display:flex;gap:3px}
.slot-copy-btn{background:#eff6ff;border:none;border-radius:4px;color:#3b82f6;font-size:11px;padding:2px 6px;cursor:pointer;font-weight:700;line-height:1.6}
.slot-del-btn{background:#fee2e2;border:none;border-radius:4px;color:#ef4444;font-size:11px;padding:2px 6px;cursor:pointer;font-weight:700;line-height:1.6}
.slot-body{margin-top:18px;text-align:center}
.slot-company{display:inline-block;color:#fff;padding:4px 11px;border-radius:7px;font-weight:700;font-size:13px}
.slot-empty{color:#d1d5db;font-size:11px}
.slot-edit{margin-top:14px}
.slot-edit input{width:100%;padding:6px 8px;border-radius:7px;border:1.5px solid #6366f1;background:#fff;color:#111;font-size:13px;outline:none}
.slot-edit-btns{display:flex;gap:4px;margin-top:5px}
.slot-save-btn{flex:1;padding:5px;border-radius:6px;border:none;background:linear-gradient(135deg,#6366f1,#3b82f6);color:#fff;cursor:pointer;font-weight:700;font-size:12px}
.slot-cancel-btn{padding:5px 8px;border-radius:6px;border:1.5px solid #e5e7eb;background:#fff;color:#6b7280;cursor:pointer;font-size:12px}
.stats-box{background:#fff;border-radius:16px;border:1.5px solid #e5e7eb;padding:20px 22px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.stats-title{font-weight:700;font-size:15px;margin-bottom:18px;color:#111827}
.stats-sections{display:flex;gap:10px;flex-wrap:wrap}
.stat-section{flex:1;min-width:260px;border-radius:14px;padding:16px 18px}
.stat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.stat-label-badge{border-radius:6px;padding:2px 9px;font-size:11px;font-weight:700}
.stat-num{font-weight:800;font-size:20px}
.stat-max{font-size:12px;color:#9ca3af;font-weight:500;margin-left:2px}
.progress-bar-bg{height:6px;border-radius:99px;background:#e5e7eb;margin-bottom:12px;overflow:hidden}
.progress-bar-fg{height:100%;border-radius:99px;transition:width .4s}
.stat-table{width:100%;border-collapse:collapse;font-size:12px}
.stat-table th{text-align:left;padding:5px 8px;color:#9ca3af;font-weight:600;font-size:10px;border-bottom:1.5px solid #f3f4f6}
.stat-table th.center,.stat-table td.center{text-align:center}
.stat-table td{padding:7px 8px;border-bottom:1px solid #f9fafb}
.stat-table td.center{font-weight:700;color:#374151}
.company-dot{width:9px;height:9px;border-radius:3px;display:inline-block;flex-shrink:0}
.company-name{font-weight:600;color:#111827}
.company-refs{color:#9ca3af;font-size:10px;line-height:1.6}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:300}
.modal-card{background:#fff;border-radius:20px;box-shadow:0 24px 64px rgba(0,0,0,.18);padding:26px 26px 22px;width:92%;max-width:420px}
.modal-title{font-weight:800;font-size:17px;margin-bottom:18px;color:#111827}
.modal-sub{font-size:13px;color:#6b7280;margin-bottom:18px}
.modal-row{display:flex;gap:10px;margin-bottom:14px}
.modal-field{flex:1}
.modal-btns{display:flex;gap:8px;margin-top:4px}
.mbtn-primary{flex:1;padding:10px;border-radius:9px;border:none;background:linear-gradient(135deg,#6366f1,#3b82f6);color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.mbtn-ghost{padding:10px 16px;border-radius:9px;border:1.5px solid #e5e7eb;background:transparent;color:#6b7280;font-size:14px;cursor:pointer}
.copy-prev-label{display:flex;align-items:center;gap:10px;cursor:pointer;background:#f9fafb;border-radius:11px;padding:11px 14px;border:1.5px solid #e5e7eb;margin-bottom:18px;font-size:13px;color:#374151}
.hint{font-size:11px;color:#9ca3af;margin-top:4px;margin-bottom:14px}
.loading{min-height:100vh;display:flex;align-items:center;justify-content:center;font-size:15px;color:#9ca3af}
.user-info{font-size:12px;color:#6b7280;padding:5px 10px;background:#f9fafb;border-radius:8px;border:1.5px solid #e5e7eb}
</style>
</head>
<body>

<div id="loading-screen" class="loading">読み込み中...</div>

<div id="auth-screen" class="hidden">
  <div class="auth-card">
    <div class="auth-logo">📋</div>
    <div class="auth-title">広告枠マネージャー</div>
    <div class="auth-sub">社内共有ワークスペース</div>
    <div id="auth-error" class="auth-error"></div>
    <div class="fld">
      <div class="fl">メールアドレス</div>
      <input id="email-input" class="inp" type="email" placeholder="example@company.com">
    </div>
    <div class="fld">
      <div class="fl">パスワード</div>
      <input id="password-input" class="inp" type="password" placeholder="••••••••">
    </div>
    <button class="btn-primary" onclick="doLogin()">ログイン</button>
  </div>
</div>

<div id="app-screen" class="hidden">
  <div class="header">
    <div class="header-left">
      <div class="header-icon">📋</div>
      <div>
        <div class="header-title">広告枠マネージャー</div>
        <div class="header-sub">共有ワークスペース</div>
      </div>
    </div>
    <div class="header-right">
      <div id="month-tabs" style="display:flex;gap:5px;flex-wrap:wrap"></div>
      <button class="month-add-btn" onclick="openModal('newMonth')">＋ 新規月</button>
      <div id="user-badge" class="user-info"></div>
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </div>
  <div class="main">
    <div id="empty-state" class="empty hidden">
      <div style="font-size:52px;margin-bottom:16px">📅</div>
      <p style="font-size:17px;font-weight:500">「＋ 新規月」から月を作成してください</p>
    </div>
    <div id="app-content" class="hidden">
      <div id="page-tabs" class="page-tabs"></div>
      <div class="toolbar">
        <div class="toolbar-left">
          <span id="cur-type-tag" class="type-tag"></span>
          <span id="cur-page-name" class="page-name"></span>
          <span id="cur-grid-badge" class="page-cfg-badge"></span>
        </div>
        <div class="toolbar-right" id="toolbar-right"></div>
      </div>
      <div id="slot-grid" class="slot-grid"></div>
      <div class="stats-box">
        <div class="stats-title" id="stats-title"></div>
        <div class="stats-sections" id="stats-sections"></div>
      </div>
    </div>
  </div>
</div>

<div id="modal-newMonth" class="modal-overlay hidden" onclick="closeModal('newMonth')">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-title">新規月を作成</div>
    <div class="modal-row">
      <div class="modal-field">
        <div class="fl">年</div>
        <input id="nm-year" class="inp" type="number" value="2026">
      </div>
      <div class="modal-field">
        <div class="fl">月</div>
        <select id="nm-month" class="inp" style="appearance:none;cursor:pointer">
          <option value="0">1月</option><option value="1">2月</option><option value="2">3月</option>
          <option value="3">4月</option><option value="4">5月</option><option value="5">6月</option>
          <option value="6">7月</option><option value="7">8月</option><option value="8">9月</option>
          <option value="9">10月</option><option value="10">11月</option><option value="11">12月</option>
        </select>
      </div>
    </div>
    <div id="copy-prev-row"></div>
    <div class="modal-btns">
      <button class="mbtn-primary" onclick="createMonth()">作成</button>
      <button class="mbtn-ghost" onclick="closeModal('newMonth')">キャンセル</button>
    </div>
  </div>
</div>

<div id="modal-bulkFill" class="modal-overlay hidden" onclick="closeModal('bulkFill')">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-title">一括入力</div>
    <div class="modal-sub" id="bulk-sub"></div>
    <div class="fl">会社名</div>
    <input id="bf-company" class="inp" placeholder="例：株式会社○○" style="margin-bottom:14px">
    <div class="fl">枠番号（カンマ区切り）</div>
    <input id="bf-slots" class="inp" placeholder="例：1, 2, 5, 6">
    <div class="hint" id="bf-hint"></div>
    <div class="modal-btns">
      <button class="mbtn-primary" onclick="applyBulkFill()">入力する</button>
      <button class="mbtn-ghost" onclick="closeModal('bulkFill')">キャンセル</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGBXVFGs1bUpd47gVDW10sRjaVpEMa07s",
  authDomain: "adwaku-79211.firebaseapp.com",
  projectId: "adwaku-79211",
  storageBucket: "adwaku-79211.firebasestorage.app",
  messagingSenderId: "465095025516",
  appId: "1:465095025516:web:125939eb41f6c2f58cc949",
};
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

const COLORS = ["#3B82F6","#EF4444","#10B981","#F59E0B","#8B5CF6","#EC4899","#06B6D4","#84CC16","#F97316","#6366F1","#14B8A6","#EAB308","#E11D48","#7C3AED","#0EA5E9","#22C55E"];
const PAGE_TYPES = {
  ad:  {label:"広告",cols:2,rows:4,tag:"AD", tagColor:"#6366f1"},
  job: {label:"求人",cols:3,rows:5,tag:"JOB",tagColor:"#10b981"},
};
const DEFAULT_PAGES = [
  {type:"ad",name:"広告 A"},{type:"ad",name:"広告 B"},
  {type:"ad",name:"広告 C"},{type:"job",name:"求人"},
];

function makeSlots(type){
  const {cols,rows}=PAGE_TYPES[type];
  return Array.from({length:cols*rows},(_,i)=>({id:i,company:""}));
}
function monthKey(y,m){return `${y}-${String(m+1).padStart(2,"0")}`;}
function fmtMonth(k){const[y,m]=k.split("-");return `${y}年${+m}月`;}

let allData={}, months=[], currentMonth=null, activePage=0;
let editingSlot=null, copyMode=false, copySource=null;
let unsubscribe=null;

// ── Auth ──────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, user => {
  document.getElementById("loading-screen").classList.add("hidden");
  if(user){
    document.getElementById("auth-screen").classList.add("hidden");
    document.getElementById("app-screen").classList.remove("hidden");
    document.getElementById("user-badge").textContent = user.email;
    startListener();
  } else {
    if(unsubscribe){unsubscribe();unsubscribe=null;}
    document.getElementById("auth-screen").classList.remove("hidden");
    document.getElementById("app-screen").classList.add("hidden");
  }
});

window.doLogin = async function(){
  const email=document.getElementById("email-input").value.trim();
  const pass=document.getElementById("password-input").value;
  const errEl=document.getElementById("auth-error");
  errEl.style.display="none";
  try{ await signInWithEmailAndPassword(auth,email,pass); }
  catch(e){ errEl.style.display="block"; errEl.textContent="メールアドレスまたはパスワードが正しくありません"; }
};
window.doLogout = async function(){
  if(unsubscribe){unsubscribe();unsubscribe=null;}
  await signOut(auth);
};
document.getElementById("password-input").addEventListener("keydown",e=>{
  if(e.key==="Enter") window.doLogin();
});

// ── Firestore リアルタイムリスナー ────────────────────────────────────────────
function startListener(){
  if(unsubscribe) unsubscribe();
  unsubscribe = onSnapshot(collection(db,"months"), snap => {
    const backup = editingSlot;
    allData={};
    snap.forEach(d=>{ allData[d.id]=d.data(); });
    months=Object.keys(allData).sort();
    if(!currentMonth || !allData[currentMonth]){
      currentMonth = months.length ? months[months.length-1] : null;
    }
    editingSlot=backup;
    render();
  }, err=>{ console.error("Firestore:",err); });
}

async function saveMonth(key,data){
  try{ await setDoc(doc(db,"months",key),data); }
  catch(e){ console.error(e); }
}

// ── Data helpers ──────────────────────────────────────────────────────────────
function cur(){ return currentMonth ? allData[currentMonth] : null; }
function getPages(){ return cur()?.pages || DEFAULT_PAGES; }
function getSlots(pi){
  const pg=cur()?.slots?.[pi];
  return pg || makeSlots(getPages()[pi]?.type||"ad");
}
function getAllSlots(){ return getPages().map((_,i)=>getSlots(i)); }

function patch(update){
  if(!currentMonth) return;
  allData[currentMonth]={...allData[currentMonth],...update};
  render();
  saveMonth(currentMonth,allData[currentMonth]);
}
function setSlotVal(pi,sid,company){
  const slots=getAllSlots().map((pg,i)=>
    i===pi ? pg.map(s=>s.id===sid?{...s,company}:s) : pg
  );
  patch({slots});
}

function buildColorMap(){
  const cos=[...new Set(getAllSlots().flat().map(s=>s.company).filter(Boolean))];
  const map={};
  cos.forEach((c,i)=>{map[c]=COLORS[i%COLORS.length];});
  return map;
}

// ── Modals ────────────────────────────────────────────────────────────────────
window.openModal=function(name){
  if(name==="bulkFill"){
    const cfg=PAGE_TYPES[getPages()[activePage]?.type||"ad"];
    document.getElementById("bulk-sub").textContent=
      `${getPages()[activePage]?.name} — 指定した枠番号に会社名を一括入力します`;
    document.getElementById("bf-hint").textContent=
      `このページには ${cfg.cols*cfg.rows} 枠あります（1〜${cfg.cols*cfg.rows}）`;
    document.getElementById("bf-company").value="";
    document.getElementById("bf-slots").value="";
  }
  if(name==="newMonth"){
    const now=new Date();
    document.getElementById("nm-year").value=now.getFullYear();
    document.getElementById("nm-month").value=now.getMonth();
    const row=document.getElementById("copy-prev-row");
    row.innerHTML=months.length>0?`
      <label class="copy-prev-label">
        <input type="checkbox" id="copy-prev-cb" style="width:15px;height:15px;accent-color:#6366f1">
        前月（${fmtMonth(months[months.length-1])}）のデータをコピー
      </label>`:"";
  }
  document.getElementById(`modal-${name}`).classList.remove("hidden");
};
window.closeModal=function(name){
  document.getElementById(`modal-${name}`).classList.add("hidden");
};

// ── New month ─────────────────────────────────────────────────────────────────
window.createMonth=function(){
  const y=+document.getElementById("nm-year").value;
  const m=+document.getElementById("nm-month").value;
  const key=monthKey(y,m);
  const copyPrev=document.getElementById("copy-prev-cb")?.checked;
  let pages,slots;
  if(copyPrev && months.length>0){
    const prev=allData[months[months.length-1]];
    pages=(prev.pages||DEFAULT_PAGES).map(p=>({...p}));
    const prevSlots=pages.map((_,i)=>prev.slots?.[i]||makeSlots(pages[i].type));
    slots=prevSlots.map(pg=>pg.map(s=>({...s})));
  } else {
    pages=DEFAULT_PAGES.map(p=>({...p}));
    slots=pages.map(p=>makeSlots(p.type));
  }
  allData[key]={pages,slots};
  months=[...new Set([...months,key])].sort();
  currentMonth=key; activePage=0;
  saveMonth(key,allData[key]);
  closeModal("newMonth");
  render();
};

// ── Bulk fill ─────────────────────────────────────────────────────────────────
window.applyBulkFill=function(){
  const company=document.getElementById("bf-company").value.trim();
  if(!company) return;
  const nums=document.getElementById("bf-slots").value
    .split(/[,\s]+/).map(n=>parseInt(n)-1).filter(n=>!isNaN(n)&&n>=0);
  const pg=getSlots(activePage);
  const updated=pg.map(s=>nums.includes(s.id)?{...s,company}:s);
  const slots=getAllSlots().map((p,i)=>i===activePage?updated:p);
  patch({slots});
  closeModal("bulkFill");
};

// ── Toggle page type ──────────────────────────────────────────────────────────
window.togglePageType=function(){
  const pgs=getPages();
  const next=pgs[activePage].type==="ad"?"job":"ad";
  const newPages=pgs.map((p,i)=>i===activePage?{...p,type:next,name:PAGE_TYPES[next].label}:p);
  const slots=getAllSlots().map((s,i)=>i===activePage?makeSlots(next):s);
  patch({pages:newPages,slots});
};

// ── Copy mode ─────────────────────────────────────────────────────────────────
window.startCopyBtn=function(pi,sid,company){
  copySource={pi,sid,company}; copyMode=true; render();
};
window.exitCopyMode=function(){
  copyMode=false; copySource=null; render();
};

// ── Slot interactions ─────────────────────────────────────────────────────────
window.slotClick=function(pi,sid){
  if(copyMode){ if(copySource) setSlotVal(pi,sid,copySource.company); return; }
  if(editingSlot?.pi===pi && editingSlot?.id===sid) return;
  editingSlot={pi,id:sid};
  render();
  setTimeout(()=>document.getElementById(`si-${pi}-${sid}`)?.focus(),30);
};
window.confirmEdit=function(pi,sid){
  const val=document.getElementById(`si-${pi}-${sid}`)?.value.trim()||"";
  setSlotVal(pi,sid,val);
  editingSlot=null;
};
window.cancelEdit=function(){ editingSlot=null; render(); };
window.slotKey=function(e,pi,sid){
  if(e.key==="Enter") window.confirmEdit(pi,sid);
  if(e.key==="Escape") window.cancelEdit();
};
window.deleteSlot=function(pi,sid){ setSlotVal(pi,sid,""); };
window.switchMonth=function(m){ currentMonth=m; activePage=0; editingSlot=null; copyMode=false; copySource=null; render(); };
window.switchPage=function(i){ activePage=i; editingSlot=null; copyMode=false; copySource=null; render(); };

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  const has=!!currentMonth;
  document.getElementById("empty-state").classList.toggle("hidden",has);
  document.getElementById("app-content").classList.toggle("hidden",!has);
  renderMonthTabs();
  if(!has) return;
  const pgs=getPages();
  const ctype=pgs[activePage]?.type||"ad";
  const ccfg=PAGE_TYPES[ctype];
  const cmap=buildColorMap();
  renderPageTabs(pgs,cmap);
  renderToolbar(pgs,ctype,ccfg);
  renderGrid(ctype,ccfg,cmap);
  renderStats(pgs,cmap);
}

function renderMonthTabs(){
  document.getElementById("month-tabs").innerHTML=
    months.map(m=>`<button class="month-btn${currentMonth===m?" active":""}" onclick="switchMonth('${m}')">${fmtMonth(m)}</button>`).join("");
}

function renderPageTabs(pgs,cmap){
  const allS=getAllSlots();
  document.getElementById("page-tabs").innerHTML=pgs.map((pg,i)=>{
    const cfg=PAGE_TYPES[pg.type];
    const filled=(allS[i]||[]).filter(s=>s.company).length;
    const tot=cfg.cols*cfg.rows;
    const act=activePage===i;
    return `<button class="page-tab${act?" active":""}" onclick="switchPage(${i})">
      <div style="display:flex;align-items:center;justify-content:center;gap:5px">
        <span class="type-tag" style="background:${act?"rgba(255,255,255,.25)":cfg.tagColor+"18"};color:${act?"#fff":cfg.tagColor}">${cfg.tag}</span>
        ${pg.name}
      </div>
      <div style="font-size:10px;opacity:.7;margin-top:2px">${cfg.cols}×${cfg.rows} · ${filled}/${tot}</div>
    </button>`;
  }).join("");
}

function renderToolbar(pgs,ctype,ccfg){
  const tTag=document.getElementById("cur-type-tag");
  tTag.textContent=ccfg.tag;
  tTag.style.background=ccfg.tagColor+"18";
  tTag.style.color=ccfg.tagColor;
  document.getElementById("cur-page-name").textContent=pgs[activePage]?.name||"";
  document.getElementById("cur-grid-badge").textContent=`${ccfg.cols}列×${ccfg.rows}行`;
  document.getElementById("toolbar-right").innerHTML=copyMode
    ?`<div class="copy-banner">📋 コピー中：<strong>${copySource?.company}</strong>　貼り付ける枠をクリック<button class="copy-end-btn" onclick="exitCopyMode()">終了</button></div>`
    :`<button class="tbtn" onclick="openModal('bulkFill')">一括入力</button>
      <button class="tbtn" onclick="togglePageType()">${ctype==="ad"?"→ 求人に切替":"→ 広告に切替"}</button>`;
}

function renderGrid(ctype,ccfg,cmap){
  const grid=document.getElementById("slot-grid");
  grid.style.gridTemplateColumns=`repeat(${ccfg.cols},1fr)`;
  const curSlots=getSlots(activePage);
  grid.innerHTML=curSlots.map((slot,li)=>{
    const color=slot.company?cmap[slot.company]:null;
    const isEdit=editingSlot?.pi===activePage&&editingSlot?.id===slot.id;
    const isSrc=copySource?.pi===activePage&&copySource?.sid===slot.id;
    const borderC=isSrc?"#f59e0b":(color||"#e5e7eb");
    const bgC=isSrc?"#fef3c7":(color?color+"14":"#fff");
    const outline=copyMode&&!isSrc?"outline:2px dashed #fbbf24;":"";
    const cv=(slot.company||"").replace(/'/g,"\\'").replace(/"/g,"&quot;");

    const actions=slot.company&&!isEdit&&!copyMode
      ?`<div class="slot-actions">
          <button class="slot-copy-btn" onclick="event.stopPropagation();startCopyBtn(${activePage},${slot.id},'${cv}')">⧉</button>
          <button class="slot-del-btn" onclick="event.stopPropagation();deleteSlot(${activePage},${slot.id})">✕</button>
        </div>`:"";

    const body=isEdit
      ?`<div class="slot-edit">
          <input id="si-${activePage}-${slot.id}" value="${cv}" placeholder="会社名を入力..." onkeydown="slotKey(event,${activePage},${slot.id})">
          <div class="slot-edit-btns">
            <button class="slot-save-btn" onclick="confirmEdit(${activePage},${slot.id})">保存</button>
            <button class="slot-cancel-btn" onclick="cancelEdit()">×</button>
          </div>
        </div>`
      :`<div class="slot-body" onclick="slotClick(${activePage},${slot.id})">
          ${slot.company
            ?`<span class="slot-company" style="background:${color}">${slot.company}</span>`
            :`<span class="slot-empty">${copyMode?"ここに貼り付け":"クリックして入力"}</span>`}
        </div>`;

    return `<div class="slot-card${ctype==="job"?" job":""}" style="border-color:${borderC};background:${bgC};${outline}">
      <div class="slot-num">#${li+1}</div>
      ${actions}${body}
    </div>`;
  }).join("");
}

function renderStats(pgs,cmap){
  document.getElementById("stats-title").textContent=`📊 広告一覧 — ${fmtMonth(currentMonth)}`;
  const allS=getAllSlots();
  function tally(type){
    const sl=allS.filter((_,i)=>pgs[i]?.type===type).flat();
    const map={};
    sl.filter(s=>s.company).forEach(s=>{map[s.company]=(map[s.company]||0)+1;});
    return{slots:sl,countMap:map,total:sl.filter(s=>s.company).length};
  }
  document.getElementById("stats-sections").innerHTML=
    statSec("広告枠","#6366f1",tally("ad"),cmap,allS,pgs,"ad")+
    statSec("求人枠","#10b981",tally("job"),cmap,allS,pgs,"job");
}

function statSec(label,color,data,cmap,allS,pgs,type){
  const{slots,countMap,total}=data;
  const max=slots.length;
  const pct=max?Math.round(total/max*100):0;
  const rows=Object.entries(countMap).sort((a,b)=>b[1]-a[1]).map(([company,count])=>{
    const c=cmap[company]||"#6b7280";
    const refs=allS.flatMap((pg,pi)=>
      pgs[pi]?.type===type?pg.filter(s=>s.company===company).map(s=>`P${pi+1}-#${s.id+1}`) :[]
    ).join(" ");
    return `<tr>
      <td><span style="display:inline-flex;align-items:center;gap:6px">
        <span class="company-dot" style="background:${c}"></span>
        <span class="company-name">${company}</span>
      </span></td>
      <td class="center">${count}</td>
      <td class="company-refs">${refs}</td>
    </tr>`;
  }).join("");
  const table=Object.keys(countMap).length===0
    ?`<p style="color:#d1d5db;font-size:12px;margin:0">未登録</p>`
    :`<table class="stat-table">
        <thead><tr><th>会社名</th><th class="center">枠数</th><th>場所</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  return `<div class="stat-section" style="border:1.5px solid ${color}30;background:${color}06">
    <div class="stat-header">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="stat-label-badge" style="background:${color}18;color:${color}">${label}</span>
        <span class="stat-num" style="color:${color}">${total}<span class="stat-max">/ ${max}</span></span>
      </div>
      <span style="font-size:12px;font-weight:700;color:${color}">${pct}%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fg" style="width:${pct}%;background:linear-gradient(90deg,${color},${color}aa)"></div></div>
    ${table}
  </div>`;
}
</script>
</body>
</html>
