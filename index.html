<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>広告枠マネージャー</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter','Helvetica Neue',sans-serif;background:#f0f4ff;color:#111827;min-height:100vh}
  input,select,button{font-family:inherit}
  .hidden{display:none!important}

  /* ── Auth screen ── */
  #auth-screen{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#eef2ff,#f0fdf4);
  }
  .auth-card{
    background:#fff;border-radius:20px;padding:36px 32px;
    box-shadow:0 20px 60px rgba(0,0,0,0.12);width:92%;max-width:380px;
  }
  .auth-logo{
    width:48px;height:48px;border-radius:14px;
    background:linear-gradient(135deg,#6366f1,#3b82f6);
    display:flex;align-items:center;justify-content:center;
    font-size:24px;margin:0 auto 16px;
  }
  .auth-title{font-size:20px;font-weight:800;text-align:center;margin-bottom:4px}
  .auth-sub{font-size:13px;color:#9ca3af;text-align:center;margin-bottom:24px}
  .field-label{font-size:11px;font-weight:600;color:#6b7280;margin-bottom:5px;letter-spacing:.3px}
  .field{margin-bottom:14px}
  .inp{
    width:100%;padding:10px 12px;border-radius:9px;
    border:1.5px solid #e5e7eb;font-size:14px;outline:none;
    transition:border-color .15s;
  }
  .inp:focus{border-color:#6366f1}
  .btn-primary{
    width:100%;padding:11px;border-radius:10px;border:none;
    background:linear-gradient(135deg,#6366f1,#3b82f6);
    color:#fff;font-size:15px;font-weight:700;cursor:pointer;
    box-shadow:0 4px 14px rgba(99,102,241,0.35);
  }
  .auth-error{
    background:#fef2f2;border:1.5px solid #fecaca;
    border-radius:9px;padding:10px 13px;
    font-size:13px;color:#dc2626;margin-bottom:14px;display:none;
  }

  /* ── App ── */
  #app-screen{min-height:100vh}

  /* Header */
  .header{
    background:#fff;border-bottom:1.5px solid #e5e7eb;
    padding:12px 20px;display:flex;align-items:center;
    justify-content:space-between;flex-wrap:wrap;gap:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
    position:sticky;top:0;z-index:100;
  }
  .header-left{display:flex;align-items:center;gap:10px}
  .header-icon{
    width:34px;height:34px;border-radius:9px;
    background:linear-gradient(135deg,#6366f1,#3b82f6);
    display:flex;align-items:center;justify-content:center;font-size:17px;
  }
  .header-title{font-weight:800;font-size:15px}
  .header-sub{font-size:10px;color:#9ca3af}
  .header-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

  /* Month tabs */
  .month-btn{
    padding:5px 13px;border-radius:8px;border:1.5px solid #e5e7eb;
    background:#fff;color:#374151;cursor:pointer;font-size:13px;font-weight:500;
    transition:all .15s;
  }
  .month-btn.active{
    border:none;background:linear-gradient(135deg,#6366f1,#3b82f6);
    color:#fff;box-shadow:0 3px 10px rgba(99,102,241,.28);font-weight:700;
  }
  .month-add-btn{
    padding:5px 13px;border-radius:8px;border:1.5px dashed #a5b4fc;
    background:#eef2ff;color:#6366f1;cursor:pointer;font-size:13px;font-weight:600;
  }
  .logout-btn{
    padding:5px 12px;border-radius:8px;border:1.5px solid #e5e7eb;
    background:#fff;color:#6b7280;cursor:pointer;font-size:12px;font-weight:600;
  }

  /* Main */
  .main{max-width:1020px;margin:0 auto;padding:18px 14px}

  /* Empty state */
  .empty{text-align:center;padding:100px 20px;color:#9ca3af}
  .empty-icon{font-size:52px;margin-bottom:16px}

  /* Page tabs */
  .page-tabs{
    display:flex;gap:5px;margin-bottom:16px;
    background:#fff;border-radius:14px;padding:5px;
    box-shadow:0 1px 4px rgba(0,0,0,.07);
  }
  .page-tab{
    flex:1;padding:8px 10px;border-radius:10px;border:none;
    background:transparent;color:#6b7280;cursor:pointer;
    font-weight:500;font-size:13px;transition:all .15s;
  }
  .page-tab.active{
    background:linear-gradient(135deg,#6366f1,#3b82f6);color:#fff;
    font-weight:700;box-shadow:0 3px 10px rgba(99,102,241,.3);
  }
  .page-tab-label{display:flex;align-items:center;justify-content:center;gap:5px}
  .page-tab-sub{font-size:10px;opacity:.7;margin-top:2px}
  .type-tag{border-radius:5px;padding:1px 6px;font-size:10px;font-weight:700}

  /* Toolbar */
  .toolbar{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:12px;flex-wrap:wrap;gap:8px;
  }
  .toolbar-left{display:flex;align-items:center;gap:8px}
  .toolbar-right{display:flex;gap:6px;flex-wrap:wrap}
  .page-name{font-weight:700;font-size:16px}
  .page-cfg-badge{
    padding:3px 10px;border-radius:20px;background:#eef2ff;
    color:#6366f1;font-size:12px;font-weight:600;
  }

  /* Tool buttons */
  .tbtn{
    padding:6px 13px;border-radius:8px;border:1.5px solid #e5e7eb;
    background:#fff;color:#374151;cursor:pointer;font-size:12px;font-weight:600;
    box-shadow:0 1px 3px rgba(0,0,0,.06);transition:all .15s;
  }
  .tbtn:hover{background:#f9fafb}
  .copy-banner{
    display:flex;align-items:center;gap:8px;
    background:#fef3c7;border:1.5px solid #f59e0b;
    border-radius:9px;padding:6px 12px;font-size:12px;font-weight:700;color:#92400e;
  }
  .copy-end-btn{
    background:#f59e0b;border:none;border-radius:6px;
    color:#fff;font-weight:700;font-size:11px;padding:3px 9px;cursor:pointer;
  }

  /* Grid */
  .slot-grid{display:grid;gap:8px;margin-bottom:24px}
  .slot-card{
    position:relative;border-radius:11px;border:2px solid #e5e7eb;
    background:#fff;min-height:86px;padding:11px 12px;
    cursor:pointer;transition:all .13s;
    box-shadow:0 1px 3px rgba(0,0,0,.05);
  }
  .slot-card.job{min-height:72px}
  .slot-card.copy-target{outline:2px dashed #fbbf24;cursor:crosshair}
  .slot-num{
    position:absolute;top:5px;left:8px;
    font-size:10px;font-weight:700;color:#d1d5db;
  }
  .slot-actions{
    position:absolute;top:4px;right:5px;display:flex;gap:3px;
  }
  .slot-copy-btn{
    background:#eff6ff;border:none;border-radius:4px;
    color:#3b82f6;font-size:11px;padding:2px 6px;
    cursor:pointer;font-weight:700;line-height:1.6;
  }
  .slot-del-btn{
    background:#fee2e2;border:none;border-radius:4px;
    color:#ef4444;font-size:11px;padding:2px 6px;
    cursor:pointer;font-weight:700;line-height:1.6;
  }
  .slot-body{margin-top:18px;text-align:center}
  .slot-company{
    display:inline-block;color:#fff;
    padding:4px 11px;border-radius:7px;
    font-weight:700;font-size:13px;
  }
  .slot-empty{color:#d1d5db;font-size:11px}

  /* Inline edit */
  .slot-edit{margin-top:14px}
  .slot-edit input{
    width:100%;padding:6px 8px;border-radius:7px;
    border:1.5px solid #6366f1;background:#fff;
    color:#111;font-size:13px;outline:none;
  }
  .slot-edit-btns{display:flex;gap:4px;margin-top:5px}
  .slot-save-btn{
    flex:1;padding:5px;border-radius:6px;border:none;
    background:linear-gradient(135deg,#6366f1,#3b82f6);
    color:#fff;cursor:pointer;font-weight:700;font-size:12px;
  }
  .slot-cancel-btn{
    padding:5px 8px;border-radius:6px;
    border:1.5px solid #e5e7eb;background:#fff;
    color:#6b7280;cursor:pointer;font-size:12px;
  }

  /* Stats */
  .stats-box{
    background:#fff;border-radius:16px;border:1.5px solid #e5e7eb;
    padding:20px 22px;box-shadow:0 2px 8px rgba(0,0,0,.05);
  }
  .stats-title{font-weight:700;font-size:15px;margin-bottom:18px;color:#111827}
  .stats-sections{display:flex;gap:10px;flex-wrap:wrap}
  .stat-section{
    flex:1;min-width:260px;border-radius:14px;padding:16px 18px;
  }
  .stat-header{
    display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;
  }
  .stat-label-badge{border-radius:6px;padding:2px 9px;font-size:11px;font-weight:700}
  .stat-num{font-weight:800;font-size:20px}
  .stat-max{font-size:12px;color:#9ca3af;font-weight:500;margin-left:2px}
  .stat-pct{font-size:12px;font-weight:700}
  .progress-bar-bg{height:6px;border-radius:99px;background:#e5e7eb;margin-bottom:12px;overflow:hidden}
  .progress-bar-fg{height:100%;border-radius:99px;transition:width .4s}
  .stat-table{width:100%;border-collapse:collapse;font-size:12px}
  .stat-table th{
    text-align:left;padding:5px 8px;color:#9ca3af;
    font-weight:600;font-size:10px;border-bottom:1.5px solid #f3f4f6;
  }
  .stat-table th.center{text-align:center}
  .stat-table td{padding:7px 8px;border-bottom:1px solid #f9fafb}
  .stat-table td.center{text-align:center;font-weight:700;color:#374151}
  .company-dot{width:9px;height:9px;border-radius:3px;display:inline-block;flex-shrink:0}
  .company-name{font-weight:600;color:#111827}
  .company-refs{color:#9ca3af;font-size:10px;line-height:1.6}

  /* Modal */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.3);
    backdrop-filter:blur(5px);display:flex;align-items:center;
    justify-content:center;z-index:300;
  }
  .modal-card{
    background:#fff;border-radius:20px;
    box-shadow:0 24px 64px rgba(0,0,0,.18);
    padding:26px 26px 22px;width:92%;max-width:420px;
  }
  .modal-title{font-weight:800;font-size:17px;margin-bottom:18px;color:#111827}
  .modal-sub{font-size:13px;color:#6b7280;margin-bottom:18px}
  .modal-row{display:flex;gap:10px;margin-bottom:14px}
  .modal-field{flex:1}
  .modal-btns{display:flex;gap:8px;margin-top:4px}
  .mbtn-primary{
    flex:1;padding:10px;border-radius:9px;border:none;
    background:linear-gradient(135deg,#6366f1,#3b82f6);
    color:#fff;font-size:14px;font-weight:700;cursor:pointer;
  }
  .mbtn-ghost{
    padding:10px 16px;border-radius:9px;
    border:1.5px solid #e5e7eb;background:transparent;
    color:#6b7280;font-size:14px;cursor:pointer;
  }
  .copy-prev-label{
    display:flex;align-items:center;gap:10px;cursor:pointer;
    background:#f9fafb;border-radius:11px;padding:11px 14px;
    border:1.5px solid #e5e7eb;margin-bottom:18px;font-size:13px;color:#374151;
  }
  .hint{font-size:11px;color:#9ca3af;margin-top:4px;margin-bottom:14px}

  /* Loading */
  .loading{
    min-height:100vh;display:flex;align-items:center;
    justify-content:center;font-size:15px;color:#9ca3af;
  }

  /* User info */
  .user-info{
    font-size:12px;color:#6b7280;
    padding:5px 10px;background:#f9fafb;border-radius:8px;
    border:1.5px solid #e5e7eb;
  }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen" class="loading">読み込み中...</div>

<!-- Auth screen -->
<div id="auth-screen" class="hidden">
  <div class="auth-card">
    <div class="auth-logo">📋</div>
    <div class="auth-title">広告枠マネージャー</div>
    <div class="auth-sub">社内共有ワークスペース</div>
    <div id="auth-error" class="auth-error"></div>
    <div class="field">
      <div class="field-label">メールアドレス</div>
      <input id="email-input" class="inp" type="email" placeholder="example@company.com">
    </div>
    <div class="field">
      <div class="field-label">パスワード</div>
      <input id="password-input" class="inp" type="password" placeholder="••••••••">
    </div>
    <button class="btn-primary" onclick="doLogin()">ログイン</button>
  </div>
</div>

<!-- App screen -->
<div id="app-screen" class="hidden">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="header-icon">📋</div>
      <div>
        <div class="header-title">広告枠マネージャー</div>
        <div class="header-sub">共有ワークスペース</div>
      </div>
    </div>
    <div class="header-right">
      <div id="month-tabs"></div>
      <button class="month-add-btn" onclick="openModal('newMonth')">＋ 新規月</button>
      <div id="user-badge" class="user-info"></div>
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div id="empty-state" class="empty hidden">
      <div class="empty-icon">📅</div>
      <p style="font-size:17px;font-weight:500">「＋ 新規月」から月を作成してください</p>
    </div>

    <div id="app-content" class="hidden">
      <!-- Page tabs -->
      <div id="page-tabs" class="page-tabs"></div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-left">
          <span id="cur-type-tag" class="type-tag"></span>
          <span id="cur-page-name" class="page-name"></span>
          <span id="cur-grid-badge" class="page-cfg-badge"></span>
        </div>
        <div class="toolbar-right" id="toolbar-right"></div>
      </div>

      <!-- Grid -->
      <div id="slot-grid" class="slot-grid"></div>

      <!-- Stats -->
      <div class="stats-box">
        <div class="stats-title" id="stats-title"></div>
        <div class="stats-sections" id="stats-sections"></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal: New Month -->
<div id="modal-newMonth" class="modal-overlay hidden" onclick="closeModal('newMonth')">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-title">新規月を作成</div>
    <div class="modal-row">
      <div class="modal-field">
        <div class="field-label">年</div>
        <input id="nm-year" class="inp" type="number" value="2026">
      </div>
      <div class="modal-field">
        <div class="field-label">月</div>
        <select id="nm-month" class="inp" style="appearance:none;cursor:pointer">
          <option value="0">1月</option><option value="1">2月</option>
          <option value="2">3月</option><option value="3">4月</option>
          <option value="4">5月</option><option value="5">6月</option>
          <option value="6">7月</option><option value="7">8月</option>
          <option value="8">9月</option><option value="9">10月</option>
          <option value="10">11月</option><option value="11">12月</option>
        </select>
      </div>
    </div>
    <div id="copy-prev-row"></div>
    <div class="modal-btns">
      <button class="mbtn-primary" onclick="createMonth()">作成</button>
      <button class="mbtn-ghost" onclick="closeModal('newMonth')">キャンセル</button>
    </div>
  </div>
</div>

<!-- Modal: Bulk Fill -->
<div id="modal-bulkFill" class="modal-overlay hidden" onclick="closeModal('bulkFill')">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-title">一括入力</div>
    <div class="modal-sub" id="bulk-sub"></div>
    <div class="field-label">会社名</div>
    <input id="bf-company" class="inp" placeholder="例：株式会社○○" style="margin-bottom:14px">
    <div class="field-label">枠番号（カンマ区切り）</div>
    <input id="bf-slots" class="inp" placeholder="例：1, 2, 5, 6">
    <div class="hint" id="bf-hint"></div>
    <div class="modal-btns">
      <button class="mbtn-primary" onclick="applyBulkFill()">入力する</button>
      <button class="mbtn-ghost" onclick="closeModal('bulkFill')">キャンセル</button>
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Firebase config ──────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCGBXVFGs1bUpd47gVDW10sRjaVpEMa07s",
  authDomain: "adwaku-79211.firebaseapp.com",
  projectId: "adwaku-79211",
  storageBucket: "adwaku-79211.firebasestorage.app",
  messagingSenderId: "465095025516",
  appId: "1:465095025516:web:125939eb41f6c2f58cc949",
};
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── Constants ────────────────────────────────────────────────────────────────
const COLORS = [
  "#3B82F6","#EF4444","#10B981","#F59E0B","#8B5CF6",
  "#EC4899","#06B6D4","#84CC16","#F97316","#6366F1",
  "#14B8A6","#EAB308","#E11D48","#7C3AED","#0EA5E9","#22C55E",
];
const PAGE_TYPES = {
  ad:  { label:"広告", cols:2, rows:4, tag:"AD",  tagColor:"#6366f1" },
  job: { label:"求人", cols:3, rows:5, tag:"JOB", tagColor:"#10b981" },
};
const DEFAULT_PAGES = [
  {type:"ad",  name:"広告 A"},
  {type:"ad",  name:"広告 B"},
  {type:"ad",  name:"広告 C"},
  {type:"job", name:"求人"},
];

function makeSlots(type) {
  const {cols,rows} = PAGE_TYPES[type];
  return Array.from({length:cols*rows},(_,i)=>({id:i,company:""}));
}
function monthKey(y,m){ return `${y}-${String(m+1).padStart(2,"0")}`; }
function parseKey(k){ const[y,m]=k.split("-"); return{year:+y,month:+m-1}; }
function fmtMonth(k){ const{year,month}=parseKey(k); return `${year}年${month+1}月`; }

// ── App state ────────────────────────────────────────────────────────────────
let allData     = {};
let months      = [];
let currentMonth= null;
let activePage  = 0;
let editingSlot = null; // {pi, id}
let copyMode    = false;
let copySource  = null; // {pi, id, company}
let currentUser = null;

// ── Auth ─────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  document.getElementById("loading-screen").classList.add("hidden");
  if (user) {
    currentUser = user;
    document.getElementById("auth-screen").classList.add("hidden");
    document.getElementById("app-screen").classList.remove("hidden");
    document.getElementById("user-badge").textContent = user.email;
    await loadData();
  } else {
    currentUser = null;
    document.getElementById("auth-screen").classList.remove("hidden");
    document.getElementById("app-screen").classList.add("hidden");
  }
});

window.doLogin = async function() {
  const email = document.getElementById("email-input").value.trim();
  const pass  = document.getElementById("password-input").value;
  const errEl = document.getElementById("auth-error");
  errEl.style.display = "none";
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    errEl.style.display = "block";
    errEl.textContent = "メールアドレスまたはパスワードが正しくありません";
  }
};

window.doLogout = async function() {
  await signOut(auth);
};

// Enter key on password
document.getElementById("password-input").addEventListener("keydown", e => {
  if (e.key === "Enter") window.doLogin();
});

// ── Firestore ─────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const col = collection(db, "months");
    const snap = await getDocs(col);
    allData = {};
    snap.forEach(d => { allData[d.id] = d.data(); });
    months = Object.keys(allData).sort();
    if (months.length) currentMonth = months[months.length-1];
    render();
  } catch(e) { console.error(e); }
}

async function saveMonth(key, data) {
  try {
    await setDoc(doc(db, "months", key), data);
  } catch(e) { console.error(e); }
}

// ── Data helpers ──────────────────────────────────────────────────────────────
function cur()         { return currentMonth ? allData[currentMonth] : null; }
function getPages()    { return cur()?.pages || DEFAULT_PAGES; }
function getSlots(pi)  {
  const pg = cur()?.slots?.[pi];
  if (pg) return pg;
  return makeSlots(getPages()[pi]?.type || "ad");
}
function getAllSlots()  { return getPages().map((_,i) => getSlots(i)); }

function patch(update) {
  if (!currentMonth) return;
  allData[currentMonth] = { ...allData[currentMonth], ...update };
  saveMonth(currentMonth, allData[currentMonth]);
  render();
}

function setSlot(pi, sid, company) {
  const slots = getAllSlots().map((pg,i) =>
    i===pi ? pg.map(s => s.id===sid ? {...s,company} : s) : pg
  );
  patch({slots});
}

// ── Color map ─────────────────────────────────────────────────────────────────
function buildColorMap() {
  const companies = [...new Set(getAllSlots().flat().map(s=>s.company).filter(Boolean))];
  const map = {};
  companies.forEach((c,i) => { map[c] = COLORS[i % COLORS.length]; });
  return map;
}

// ── Modals ────────────────────────────────────────────────────────────────────
window.openModal = function(name) {
